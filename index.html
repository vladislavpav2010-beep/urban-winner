<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON BATTLE ULTIMATE PRO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Outfit:wght@700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И СБРОС СТИЛЕЙ
           Я разбил всё на мелкие блоки, чтобы код был читаемым и длинным.
           ================================================================
        */
        :root {
            --bg-black: #06070a;
            --bg-dark: #0f1117;
            --bg-light: #161922;
            --bg-overlay: rgba(6, 7, 10, 0.9);
            
            --cyan: #0088cc;
            --cyan-glow: rgba(0, 136, 204, 0.5);
            --cyan-dark: #005580;
            
            --pink: #ff3b5c;
            --pink-glow: rgba(255, 59, 92, 0.5);
            --pink-dark: #99001a;
            
            --gold: #ffb800;
            --gold-glow: rgba(255, 184, 0, 0.4);
            
            --green: #20c976;
            --green-glow: rgba(32, 201, 118, 0.3);
            
            --purple: #9b51e0;
            --purple-glow: rgba(155, 81, 224, 0.4);
            
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-dark: #64748b;
            
            --brd: #1e293b;
            
            --rad-s: 12px;
            --rad-m: 20px;
            --rad-l: 30px;
            
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
        }

        /* ================================================================
           2. АНИМАЦИИ
           Добавляем динамики интерфейсу.
           ================================================================
        */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 184, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); }
        }

        @keyframes winBling {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); }
        }

        /* ================================================================
           3. КОМПОНЕНТЫ ШАПКИ
           ================================================================
        */
        header {
            padding: calc(var(--safe-t) + 15px) 20px 15px;
            background: rgba(6, 7, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--brd);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--cyan-dark));
            border: 2px solid var(--brd);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit';
            font-weight: 900;
            font-size: 20px;
            position: relative;
        }

        .level-tag {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--gold);
            color: black;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 5px;
            border: 2px solid var(--bg-black);
        }

        .user-meta-data {
            display: flex;
            flex-direction: column;
        }

        .user-meta-data .name {
            font-weight: 800;
            font-size: 15px;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-meta-data .status {
            font-size: 10px;
            color: var(--green);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .wallet-pill {
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            padding: 8px 16px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .wallet-pill:active { transform: scale(0.95); }

        .wallet-pill .amount {
            font-family: 'Outfit';
            font-weight: 900;
            font-size: 17px;
        }

        .wallet-pill .unit {
            color: var(--cyan);
            font-size: 11px;
            font-weight: 800;
        }

        /* ================================================================
           4. ОСНОВНОЙ КОНТЕНТ (РУЛЕТКА)
           ================================================================
        */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
            scrollbar-width: none;
        }

        main::-webkit-scrollbar { display: none; }

        .game-screen {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .game-screen.active { display: block; }

        .roulette-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin-top: 10px;
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid white;
            z-index: 10;
        }

        .wheel-disk {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 12px solid var(--bg-dark);
            background: conic-gradient(var(--pink) 0% 50%, var(--cyan) 50% 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
        }

        .wheel-center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: var(--bg-black);
            border: 6px solid var(--bg-light);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .timer-big {
            font-family: 'Outfit';
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
        }

        .timer-small {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
        }

        /* Статистика пулов */
        .pools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 25px;
        }

        .pool-card {
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            padding: 15px;
            border-radius: var(--rad-m);
            position: relative;
            overflow: hidden;
        }

        .pool-card.blue { border-bottom: 4px solid var(--cyan); }
        .pool-card.red { border-bottom: 4px solid var(--pink); }

        .pool-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .pool-value {
            font-family: 'Outfit';
            font-size: 22px;
            font-weight: 900;
        }

        .c-cyan { color: var(--cyan); }
        .c-pink { color: var(--pink); }

        /* Панель ставок */
        .bet-control {
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            padding: 20px;
            border-radius: var(--rad-l);
            width: 100%;
        }

        .bet-top-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .bet-input-box {
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid var(--brd);
            border-radius: var(--rad-s);
            margin-bottom: 20px;
        }

        .bet-btn-mod {
            padding: 15px 20px;
            color: var(--text-secondary);
            font-weight: 900;
            cursor: pointer;
        }

        .bet-input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-family: 'Outfit';
            font-size: 26px;
            font-weight: 900;
            width: 40%;
        }

        .bet-actions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-game {
            height: 60px;
            border: none;
            border-radius: var(--rad-s);
            color: white;
            font-family: 'Outfit';
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .btn-game:active { transform: scale(0.96); }

        .btn-cyan { 
            background: linear-gradient(135deg, var(--cyan), var(--cyan-dark)); 
            box-shadow: 0 8px 20px var(--cyan-glow);
        }
        .btn-pink { 
            background: linear-gradient(135deg, var(--pink), var(--pink-dark)); 
            box-shadow: 0 8px 20px var(--pink-glow);
        }

        .my-bet-tag {
            position: absolute;
            top: -10px;
            right: -5px;
            background: white;
            color: black;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: none;
        }

        /* ================================================================
           5. МАГАЗИН (SHOP)
           ================================================================
        */
        .shop-container {
            padding-bottom: 20px;
        }

        .shop-title {
            text-align: center;
            font-family: 'Outfit';
            font-size: 28px;
            margin-bottom: 5px;
        }

        .shop-subtitle {
            text-align: center;
            color: var(--text-dark);
            font-size: 13px;
            margin-bottom: 25px;
        }

        .shop-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .shop-tab-item {
            padding: 10px 20px;
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .shop-tab-item.active {
            background: var(--cyan);
            color: white;
            border-color: var(--cyan);
        }

        .shop-items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .shop-card {
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            border-radius: var(--rad-m);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .shop-card-icon {
            font-size: 50px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4));
        }

        .shop-card-name { font-weight: 800; font-size: 16px; margin-bottom: 5px; }
        .shop-card-desc { font-size: 11px; color: var(--text-dark); margin-bottom: 15px; }
        .shop-card-price { font-family: 'Outfit'; font-weight: 900; color: var(--gold); font-size: 18px; margin-bottom: 15px; }

        .btn-buy {
            width: 100%;
            background: var(--cyan);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px;
            font-weight: 800;
            font-size: 13px;
        }

        /* ================================================================
           6. ТАБЛИЦА ЛИДЕРОВ (TOP)
           ================================================================
        */
        .leaderboard-box {
            background: var(--bg-dark);
            border-radius: var(--rad-l);
            border: 1px solid var(--brd);
            overflow: hidden;
        }

        .lb-head {
            display: grid;
            grid-template-columns: 45px 1fr 100px;
            padding: 15px 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--brd);
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
        }

        .lb-row {
            display: grid;
            grid-template-columns: 45px 1fr 100px;
            padding: 15px 20px;
            align-items: center;
            border-bottom: 1px solid var(--brd);
        }

        .lb-rank { font-family: 'Outfit'; font-weight: 900; color: var(--text-dark); }
        .lb-user-info { display: flex; align-items: center; gap: 10px; }
        .lb-ava { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-light); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
        .lb-name { font-weight: 700; font-size: 14px; }
        .lb-val { text-align: right; font-family: 'Outfit'; font-weight: 900; }

        .rank-1 .lb-rank { color: var(--gold); font-size: 20px; }
        .rank-1 { background: rgba(255,184,0,0.05); }

        /* ================================================================
           7. ПРОФИЛЬ
           ================================================================
        */
        .profile-hero {
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-black) 100%);
            border: 1px solid var(--brd);
            border-radius: var(--rad-l);
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-avatar-big {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            background: var(--cyan);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            transform: rotate(-3deg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .xp-strip {
            margin: 20px 0;
            text-align: left;
        }

        .xp-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .xp-bar-outer {
            height: 10px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--brd);
        }

        .xp-bar-inner {
            height: 100%;
            background: var(--cyan);
            width: 45%;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .inv-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .inv-slot {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 1px solid var(--brd);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* ================================================================
           8. НАВИГАЦИЯ (NAVBAR)
           ================================================================
        */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--brd);
            padding: 10px 0 calc(var(--safe-b) + 10px);
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-dark);
            font-size: 10px;
            font-weight: 800;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--cyan); }

        /* ================================================================
           9. УВЕДОМЛЕНИЯ (TOASTS)
           ================================================================
        */
        #toast-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            width: 80%;
            pointer-events: none;
        }

        .toast {
            background: white;
            color: black;
            padding: 12px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s forwards;
        }

    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="user-block">
            <div class="user-avatar-circle" id="h-ava">P</div>
            <div class="user-meta-data">
                <div class="name" id="h-name">Загрузка...</div>
                <div class="status">ONLINE (BETA)</div>
            </div>
        </div>
        <div class="wallet-pill">
            <span class="amount" id="h-bal">105.00</span>
            <span class="unit">TON</span>
        </div>
    </header>

    <main>
        <div id="scr-game" class="game-screen active">
            <div class="roulette-box">
                <div class="wheel-wrapper">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-disk" id="wheel"></div>
                    <div class="wheel-center-display">
                        <span class="timer-big" id="timer-val">15</span>
                        <span class="timer-small">сек</span>
                    </div>
                </div>
            </div>

            <div class="pools-grid">
                <div class="pool-card blue">
                    <div class="pool-label">BLUE POOL (<span id="perc-b">50</span>%)</div>
                    <div class="pool-value c-cyan" id="pool-b-val">0.00</div>
                </div>
                <div class="pool-card red">
                    <div class="pool-label">RED POOL (<span id="perc-r">50</span>%)</div>
                    <div class="pool-value c-pink" id="pool-r-val">0.00</div>
                </div>
            </div>

            <div class="bet-control">
                <div class="bet-top-row">
                    <span>СУММА СТАВКИ</span>
                    <span style="color: var(--cyan); cursor: pointer;" onclick="setBet('max')">MAX</span>
                </div>
                <div class="bet-input-box">
                    <div class="bet-btn-mod" onclick="setBet('half')">/2</div>
                    <input type="number" id="bet-input" value="1.0" step="0.1">
                    <div class="bet-btn-mod" onclick="setBet('double')">x2</div>
                </div>
                <div class="bet-actions-row">
                    <button class="btn-game btn-cyan" onclick="makeBet('blue')">
                        BLUE
                        <div class="my-bet-tag" id="my-tag-b">0</div>
                    </button>
                    <button class="btn-game btn-pink" onclick="makeBet('red')">
                        RED
                        <div class="my-bet-tag" id="my-tag-r">0</div>
                    </button>
                </div>
            </div>
        </div>

        <div id="scr-shop" class="game-screen">
            <h1 class="shop-title">Магазин</h1>
            <p class="shop-subtitle">Улучшай профиль и дари подарки</p>
            
            <div class="shop-tabs">
                <div class="shop-tab-item active">Аватары</div>
                <div class="shop-tab-item">Подарки</div>
                <div class="shop-tab-item">Статусы</div>
            </div>

            <div class="shop-items-grid" id="shop-list">
                </div>
        </div>

        <div id="scr-top" class="game-screen">
            <h1 class="shop-title">Лидеры Сезона</h1>
            <p class="shop-subtitle">Топ 100 самых богатых игроков</p>
            
            <div class="leaderboard-box" id="top-list">
                </div>
        </div>

        <div id="scr-profile" class="game-screen">
            <div class="profile-hero">
                <div class="profile-avatar-big" id="p-ava">P</div>
                <h2 style="font-family: 'Outfit'; font-size: 26px;" id="p-name">Player</h2>
                
                <div class="xp-strip">
                    <div class="xp-labels">
                        <span>УРОВЕНЬ <span id="p-lvl">1</span></span>
                        <span>450 / 1000 XP</span>
                    </div>
                    <div class="xp-bar-outer">
                        <div class="xp-bar-inner"></div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-buy" style="height: 45px;">ДЕПОЗИТ</button>
                    <button class="btn-buy" style="height: 45px; background: var(--bg-light);">ВЫВОД</button>
                </div>
            </div>

            <h3 style="font-family: 'Outfit'; margin-bottom: 15px;">Мой Инвентарь</h3>
            <div class="inv-grid" id="inv-list">
                </div>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-item active" onclick="navTo('game', this)">
            <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.43c-.16.09-.33.14-.5.14s-.34-.05-.5-.14l-7.97-4.43c-.32-.17-.53-.5-.53-.88V7.5c0-.38.21-.71.53-.88l7.97-4.43c.16-.09.33-.14.5-.14s.34.05.5.14l7.97 4.43c.32 1.7.53.5.53.88v9z"/></svg>
            <span>Батл</span>
        </a>
        <a href="#" class="nav-item" onclick="navTo('shop', this)">
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span>Магазин</span>
        </a>
        <a href="#" class="nav-item" onclick="navTo('top', this)">
            <svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="#" class="nav-item" onclick="navTo('profile', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script>
        /* ================================================================
           10. ЛОГИКА ПРИЛОЖЕНИЯ (JAVASCRIPT)
           ================================================================
        */
        
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные пользователя
        const USER = {
            id: tg.initDataUnsafe?.user?.id || 777,
            name: tg.initDataUnsafe?.user?.first_name || "Владислав",
            balance: 105.00,
            xp: 450,
            level: 1,
            avatar: "В",
            inventory: []
        };

        // Состояние игры
        const GAME = {
            timer: 15,
            poolBlue: 0,
            poolRed: 0,
            myBetBlue: 0,
            myBetRed: 0,
            isSpinning: false,
            history: []
        };

        // Список товаров
        const SHOP_ITEMS = [
            { id: 1, name: "Cyber Punk", icon: "🤖", price: 15, desc: "Стальной стиль будущего" },
            { id: 2, name: "Golden Ape", icon: "🦧", price: 50, desc: "Для истинных холдеров" },
            { id: 3, name: "Durov Style", icon: "🕶️", price: 100, desc: "Стена будет возвращена" },
            { id: 4, name: "Rocket Man", icon: "🚀", price: 250, desc: "Летим на Луну" }
        ];

        // Инициализация
        function init() {
            document.getElementById('h-name').innerText = USER.name;
            document.getElementById('p-name').innerText = USER.name;
            document.getElementById('h-ava').innerText = USER.name[0];
            document.getElementById('p-ava').innerText = USER.name[0];
            
            updateUI();
            renderShop();
            renderTop();
            renderInventory();
            startGlobalTimer();
            startBotSimulation();
        }

        function updateUI() {
            document.getElementById('h-bal').innerText = USER.balance.toFixed(2);
            document.getElementById('pool-b-val').innerText = GAME.poolBlue.toFixed(2);
            document.getElementById('pool-r-val').innerText = GAME.poolRed.toFixed(2);
            
            // Расчет процентов
            const total = GAME.poolBlue + GAME.poolRed;
            const pB = total === 0 ? 50 : (GAME.poolBlue / total * 100);
            document.getElementById('perc-b').innerText = Math.round(pB);
            document.getElementById('perc-r').innerText = Math.round(100 - pB);
            
            // Визуал рулетки
            if (!GAME.isSpinning) {
                document.getElementById('wheel').style.background = `conic-gradient(var(--pink) 0% ${100-pB}%, var(--cyan) ${100-pB}% 100%)`;
            }

            // Тэги моих ставок
            const tb = document.getElementById('my-tag-b');
            const tr = document.getElementById('my-tag-r');
            if (GAME.myBetBlue > 0) { tb.style.display = 'block'; tb.innerText = GAME.myBetBlue; } else { tb.style.display = 'none'; }
            if (GAME.myBetRed > 0) { tr.style.display = 'block'; tr.innerText = GAME.myBetRed; } else { tr.style.display = 'none'; }
        }

        /* ТАЙМЕР И ИГРОВОЙ ЦИКЛ */
        function startGlobalTimer() {
            setInterval(() => {
                if (GAME.isSpinning) return;

                GAME.timer--;
                document.getElementById('timer-val').innerText = GAME.timer;

                if (GAME.timer <= 0) {
                    runSpin();
                }
            }, 1000);
        }

        function runSpin() {
            GAME.isSpinning = true;
            const wheel = document.getElementById('wheel');
            
            // Определяем победителя (на основе пулов)
            const total = GAME.poolBlue + GAME.poolRed;
            const winChance = total === 0 ? 50 : (GAME.poolBlue / total * 100);
            const randomPoint = Math.random() * 100;
            const winner = randomPoint <= winChance ? 'blue' : 'red';
            
            // Угол поворота (минимум 5 полных оборотов + сектор)
            const baseRotation = 1800; 
            const sectorAngle = winner === 'blue' ? (Math.random() * 170) : (190 + Math.random() * 160);
            const finalAngle = baseRotation + sectorAngle;

            wheel.style.transform = `rotate(${finalAngle}deg)`;

            setTimeout(() => {
                finishRound(winner);
            }, 5000);
        }

        function finishRound(winner) {
            let winMsg = "";
            if (winner === 'blue' && GAME.myBetBlue > 0) {
                const prize = GAME.myBetBlue * 1.95;
                USER.balance += prize;
                winMsg = `ПОБЕДА! +${prize.toFixed(2)} TON`;
            } else if (winner === 'red' && GAME.myBetRed > 0) {
                const prize = GAME.myBetRed * 1.95;
                USER.balance += prize;
                winMsg = `ПОБЕДА! +${prize.toFixed(2)} TON`;
            } else if (GAME.myBetBlue > 0 || GAME.myBetRed > 0) {
                winMsg = "Проигрыш. Попробуй еще раз!";
            } else {
                winMsg = `Выпал цвет: ${winner.toUpperCase()}`;
            }

            showToast(winMsg);
            
            // Сброс
            GAME.isSpinning = false;
            GAME.timer = 15;
            GAME.poolBlue = 0;
            GAME.poolRed = 0;
            GAME.myBetBlue = 0;
            GAME.myBetRed = 0;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            setTimeout(() => { wheel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)'; }, 50);
            
            updateUI();
        }

        /* СИМУЛЯЦИЯ БОТОВ (ЧТОБЫ БЫЛО ДВИЖЕНИЕ) */
        function startBotSimulation() {
            setInterval(() => {
                if (GAME.isSpinning || GAME.timer < 3) return;
                
                const side = Math.random() > 0.5 ? 'blue' : 'red';
                const amount = parseFloat((Math.random() * 10 + 1).toFixed(1));
                
                if (side === 'blue') GAME.poolBlue += amount;
                else GAME.poolRed += amount;
                
                updateUI();
            }, 2000);
        }

        /* ДЕЙСТВИЯ ИГРОКА */
        function makeBet(side) {
            if (GAME.isSpinning) return;
            
            const amt = parseFloat(document.getElementById('bet-input').value);
            if (amt > USER.balance || amt <= 0) {
                showToast("Недостаточно TON!");
                return;
            }

            USER.balance -= amt;
            if (side === 'blue') {
                GAME.myBetBlue += amt;
                GAME.poolBlue += amt;
            } else {
                GAME.myBetRed += amt;
                GAME.poolRed += amt;
            }
            
            updateUI();
            showToast("Ставка принята!");
        }

        function setBet(mode) {
            const input = document.getElementById('bet-input');
            let val = parseFloat(input.value);
            if (mode === 'half') input.value = (val / 2).toFixed(1);
            if (mode === 'double') input.value = (val * 2).toFixed(1);
            if (mode === 'max') input.value = USER.balance.toFixed(1);
        }

        function navTo(screenId, el) {
            document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('scr-' + screenId).classList.add('active');
            el.classList.add('active');
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = SHOP_ITEMS.map(item => `
                <div class="shop-card">
                    <div class="shop-card-icon">${item.icon}</div>
                    <div class="shop-card-name">${item.name}</div>
                    <div class="shop-card-desc">${item.desc}</div>
                    <div class="shop-card-price">${item.price} TON</div>
                    <button class="btn-buy" onclick="buyItem(${item.id})">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function buyItem(id) {
            const item = SHOP_ITEMS.find(i => i.id === id);
            if (USER.balance < item.price) {
                showToast("Недостаточно TON!");
                return;
            }
            USER.balance -= item.price;
            USER.inventory.push(item);
            showToast(`Куплено: ${item.name}`);
            updateUI();
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inv-list');
            let slots = USER.inventory.map(i => `<div class="inv-slot">${i.icon}</div>`).join('');
            for(let i = USER.inventory.length; i < 8; i++) {
                slots += `<div class="inv-slot" style="opacity: 0.2;"></div>`;
            }
            list.innerHTML = slots;
        }

        function renderTop() {
            const list = document.getElementById('top-list');
            let rows = `<div class="lb-head"><div>#</div><div>Игрок</div><div style="text-align:right">Баланс</div></div>`;
            
            const topData = [
                { name: "TON_Whale", bal: 14959.1, ava: "T" },
                { name: "Durov_fan", bal: 14929.7, ava: "D" },
                { name: "Ivan_T_956", bal: 14812.5, ava: "I" },
                { name: "CryptoGod", bal: 14759.6, ava: "C" },
                { name: "Sniper_99", bal: 14650.2, ava: "S" }
            ];

            rows += topData.map((u, i) => `
                <div class="lb-row ${i === 0 ? 'rank-1' : ''}">
                    <div class="lb-rank">${i+1}</div>
                    <div class="lb-user-info">
                        <div class="lb-ava">${u.ava}</div>
                        <div class="lb-name">${u.name}</div>
                    </div>
                    <div class="lb-val">${u.bal.toLocaleString()}</div>
                </div>
            `).join('');
            
            list.innerHTML = rows;
        }

        function showToast(text) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerText = text;
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 500);
            }, 3000);
        }

        window.onload = init;

    </script>
</body>
</html>

<style>
    .crash-root {
        padding: 15px;
        font-family: 'Inter', sans-serif;
    }

    /* Лента истории */
    .c-history {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 12px;
        scrollbar-width: none;
    }
    .c-history::-webkit-scrollbar { display: none; }
    .h-badge {
        background: #0b0d0f;
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 800;
        color: #00d2ff;
        border: 1px solid rgba(0, 210, 255, 0.2);
        white-space: nowrap;
        animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } }

    /* Игровое поле */
    .c-frame {
        height: 300px;
        background: #000;
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 40px rgba(0, 210, 255, 0.1);
    }

    /* Космический фон (сетка) */
    .c-grid {
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: 
            linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(500px) rotateX(60deg) translateY(0);
        z-index: 1;
    }

    .c-mult {
        font-family: 'JetBrains Mono', monospace;
        font-size: 64px;
        font-weight: 900;
        color: #fff;
        z-index: 10;
        text-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .c-mult.boom { color: #ff3366; text-shadow: 0 0 30px rgba(255, 51, 102, 0.4); }

    .c-rocket {
        position: absolute;
        bottom: 20%;
        left: 20%;
        font-size: 60px;
        z-index: 5;
        filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.5));
    }

    /* Оверлей ожидания */
    .c-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(8px);
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .c-timer {
        width: 90px;
        height: 90px;
        border: 4px solid #00d2ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 900;
        color: #00d2ff;
        box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
        margin-bottom: 15px;
    }

    /* Управление */
    .c-panel {
        background: #0b0d0f;
        margin-top: 15px;
        padding: 20px;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .c-input-group {
        background: #030405;
        padding: 15px;
        border-radius: 16px;
        margin-bottom: 15px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .c-input-group label { font-size: 11px; color: #707579; font-weight: 800; text-transform: uppercase; }
    .c-input-group input {
        background: transparent; border: none; color: #fff;
        font-size: 26px; font-weight: 900; width: 100%; text-align: center; outline: none;
    }

    .c-btn {
        width: 100%;
        padding: 20px;
        border-radius: 18px;
        border: none;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: #fff;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
        transition: 0.2s;
    }
    .c-btn.cashout { background: #ffcc00; color: #000; box-shadow: 0 8px 20px rgba(255, 204, 0, 0.3); }
    .c-btn:active { transform: scale(0.97); }

    /* Анимация тряски */
    @keyframes shake {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(-2px, 2px); }
        75% { transform: translate(2px, -2px); }
    }
    .anim-shake { animation: shake 0.15s infinite; }
</style>

<div class="crash-root">
    <div class="c-history" id="c-hist-list">
        <div class="h-badge">x1.44</div>
        <div class="h-badge">x2.10</div>
        <div class="h-badge">x10.55</div>
    </div>

    <div class="c-frame">
        <div class="c-grid" id="c-grid-move"></div>
        
        <div class="c-overlay" id="c-ovl">
            <div class="c-timer" id="c-timer-txt">5.0</div>
            <div style="font-size: 11px; font-weight: 900; color: #707579; letter-spacing: 2px;">CIRLLEGIFT LOADING...</div>
        </div>

        <div class="c-mult" id="c-mult-display">x1.00</div>
        <div class="c-rocket anim-shake" id="c-rocket-node">🚀</div>
    </div>

    <div class="c-panel">
        <div class="c-input-group">
            <label>Сумма ставки TON</label>
            <input type="number" id="c-bet-input" value="10">
        </div>
        <button class="c-btn" id="c-main-btn" onclick="crashApp.onAction()">СДЕЛАТЬ СТАВКУ</button>
    </div>
</div>

<script>
    const crashApp = {
        phase: 'wait', // wait, fly, boom
        mult: 1.00,
        target: 0,
        bet: 0,
        timer: 5.0,
        loop: null,

        ui: {
            ovl: document.getElementById('c-ovl'),
            tmr: document.getElementById('c-timer-txt'),
            mlt: document.getElementById('c-mult-display'),
            rkt: document.getElementById('c-rocket-node'),
            grd: document.getElementById('c-grid-move'),
            btn: document.getElementById('c-main-btn'),
            hst: document.getElementById('c-hist-list'),
            inp: document.getElementById('c-bet-input')
        },

        init() {
            this.startWait();
        },

        startWait() {
            this.phase = 'wait';
            this.timer = 5.0;
            this.mult = 1.00;
            this.ui.ovl.style.display = 'flex';
            this.ui.mlt.style.display = 'none';
            this.ui.mlt.classList.remove('boom');
            this.ui.rkt.className = 'c-rocket anim-shake';
            this.ui.rkt.style.transform = 'translate(0,0) rotate(0deg)';
            this.ui.grd.style.transform = 'perspective(500px) rotateX(60deg) translateY(0)';

            const cd = setInterval(() => {
                this.timer -= 0.1;
                this.ui.tmr.innerText = this.timer.toFixed(1);
                if(this.timer <= 0) {
                    clearInterval(cd);
                    this.startFly();
                }
            }, 100);
        },

        startFly() {
            this.phase = 'fly';
            this.ui.ovl.style.display = 'none';
            this.ui.mlt.style.display = 'block';
            this.ui.rkt.classList.remove('anim-shake');
            
            // Генерация точки краша
            const r = Math.random();
            this.target = r < 0.1 ? 1.00 : (1 + Math.random() * 4).toFixed(2);

            if(this.bet > 0) {
                this.ui.btn.innerText = 'ЗАБРАТЬ';
                this.ui.btn.classList.add('cashout');
            }

            this.loop = setInterval(() => {
                this.mult += 0.01 * (this.mult * 0.4);
                this.ui.mlt.innerText = 'x' + this.mult.toFixed(2);

                // Движение сетки (эффект скорости)
                let gridPos = (this.mult - 1) * 200;
                this.ui.grd.style.transform = `perspective(500px) rotateX(60deg) translateY(${gridPos % 40}px)`;

                // Движение ракеты
                let rocketPos = (this.mult - 1) * 40;
                this.ui.rkt.style.transform = `translate(${rocketPos}px, -${rocketPos}px)`;

                if(this.mult >= this.target) this.doBoom();
            }, 60);
        },

        doBoom() {
            clearInterval(this.loop);
            this.phase = 'boom';
            this.ui.mlt.classList.add('boom');
            this.ui.rkt.style.transform += ' rotate(160deg) scale(0.7)';
            
            // Запись в историю
            const b = document.createElement('div');
            b.className = 'h-badge';
            b.innerText = 'x' + this.mult.toFixed(2);
            this.ui.hst.prepend(b);
            if(this.ui.hst.children.length > 8) this.ui.hst.lastChild.remove();

            this.bet = 0;
            this.ui.btn.innerText = 'СДЕЛАТЬ СТАВКУ';
            this.ui.btn.classList.remove('cashout');
            this.ui.btn.style.opacity = '1';

            setTimeout(() => this.startWait(), 3000);
        },

        onAction() {
            const val = parseFloat(this.ui.inp.value);
            if(this.phase === 'wait' && this.bet === 0) {
                this.bet = val;
                this.ui.btn.innerText = 'СТАВКА ПРИНЯТА';
                this.ui.btn.style.opacity = '0.5';
            } else if(this.phase === 'fly' && this.bet > 0) {
                const win = (this.bet * this.mult).toFixed(2);
                alert('ВЫИГРЫШ: ' + win + ' TON');
                this.bet = 0;
                this.ui.btn.innerText = 'ОЖИДАНИЕ...';
                this.ui.btn.classList.remove('cashout');
            }
        }
    };

    // Авто-запуск при загрузке
    crashApp.init();
</script>

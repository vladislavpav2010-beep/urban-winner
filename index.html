<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON BATTLE ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0f;
            --accent: #0088cc;
            --gold: #f7a809;
            --text: #ffffff;
            --text-m: #707075;
            --border: #1f1f22;
            --green: #2ecb71;
            --blue: #0088cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER & TON LOGO */
        .header {
            height: 65px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .ton-icon { width: 20px; height: 20px; }
        .balance-pill { background: #121214; padding: 6px 12px; border-radius: 100px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; font-family: 'Outfit'; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #080808; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding-bottom: 15px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-m); font-size: 10px; font-weight: 700; text-transform: uppercase; width: 25%; cursor: pointer;}
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        /* CONTENT */
        .content { padding-top: 65px; padding-bottom: 80px; height: 100vh; overflow-y: auto; }
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BATTLE MODE */
        .battle-area { text-align: center; }
        .chance-track { position: relative; height: 45px; background: #1a1a1e; border-radius: 12px; overflow: hidden; display: flex; border: 1px solid var(--border); margin: 20px 0; }
        .team-bar { height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-family: 'Outfit'; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); font-size: 18px; }
        .team-g { background: var(--green); color: #000; text-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .team-b { background: var(--blue); color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.4); }
        
        .win-pointer { position: absolute; top: 0; bottom: 0; width: 4px; background: #fff; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #fff; z-index: 5; display: none; }
        .spinning .win-pointer { display: block; animation: pointerMove 0.1s infinite alternate; }
        @keyframes pointerMove { from { opacity: 0.5; } to { opacity: 1; } }

        .muls-box { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mul-card { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; }
        .mul-card span { display: block; font-size: 10px; color: var(--text-m); font-weight: 800; }
        .mul-card b { font-size: 20px; font-family: 'Outfit'; }

        .bet-input-container { background: #121214; border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .bet-input-container input { background: transparent; border: none; color: #fff; font-size: 24px; font-weight: 800; width: 100%; outline: none; font-family: 'Outfit'; }

        /* REAL LEADERBOARD */
        .top-user { display: flex; align-items: center; gap: 15px; background: var(--card); border: 1px solid var(--border); padding: 12px 15px; border-radius: 18px; margin-bottom: 10px; }
        .top-user.rank-1 { border-color: var(--gold); background: linear-gradient(90deg, #0d0d0f 0%, #1a1508 100%); }
        .rank-num { width: 30px; font-weight: 900; font-family: 'Outfit'; font-size: 18px; }
        .rank-1 .rank-num { color: var(--gold); }
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: #222; overflow: hidden; }
        .top-name { flex: 1; font-weight: 700; font-size: 14px; }
        .top-val { font-weight: 800; color: var(--accent); font-family: 'Outfit'; }

        /* PROFILE (RESTORED) */
        .lvl-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .lvl-header { display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 10px; font-size: 14px; }
        .lvl-bar { height: 10px; background: #1a1a1e; border-radius: 5px; overflow: hidden; }
        .lvl-fill { height: 100%; background: var(--accent); width: 45%; box-shadow: 0 0 10px var(--accent); }
        
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .inv-slot { aspect-ratio: 1; background: #121214; border: 2px dashed var(--border); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-c { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 30px; text-align: center; width: 100%; }
        .btn-main { background: var(--accent); color: #fff; padding: 18px; border-radius: 15px; border: none; width: 100%; font-weight: 900; font-family: 'Outfit'; text-transform: uppercase; margin-top: 15px; }

    </style>
</head>
<body>

    <svg style="display:none">
        <symbol id="ton-logo" viewBox="0 0 512 512">
            <circle cx="256" cy="256" r="256" fill="#0098EA"/>
            <path d="M113.81 184.223L243.621 391.705C248.983 400.279 263.017 400.279 268.379 391.705L398.19 184.223C404.93 173.444 397.202 159 384.49 159H127.51C114.798 159 107.07 173.444 113.81 184.223Z" fill="white"/>
        </symbol>
    </svg>

    <div id="bonus-modal" class="modal">
        <div class="modal-c">
            <h2 style="font-family:'Outfit'; margin-bottom:10px;">БОНУС 0.50 TON 🎁</h2>
            <p style="color:var(--text-m); font-size:14px; margin-bottom:20px;">Подпишись на наши каналы, чтобы активировать аккаунт!</p>
            <button class="btn-main" onclick="closeBonus()">ПОЛУЧИТЬ</button>
        </div>
    </div>

    <div class="header">
        <div style="font-family:'Outfit'; font-weight:900; font-size:20px;">TON <span style="color:var(--accent)">BATTLE</span></div>
        <div class="balance-pill">
            <span id="bal-val">0.00</span>
            <svg class="ton-icon"><use href="#ton-logo"></use></svg>
        </div>
    </div>

    <div class="content">
        <div id="view-battle" class="screen active">
            <div class="battle-area">
                <div style="font-family:'Outfit'; font-weight:900; font-size:48px;" id="timer">15</div>
                <p style="color:var(--text-m); font-size:12px; text-transform:uppercase; font-weight:800;">До начала раунда</p>

                <div class="chance-track" id="track">
                    <div class="win-pointer"></div>
                    <div id="bar-g" class="team-bar team-g" style="width: 50%;">50%</div>
                    <div id="bar-b" class="team-bar team-b" style="width: 50%;">50%</div>
                </div>

                <div class="muls-box">
                    <div class="mul-card"><span>GREEN</span><b id="m-g" style="color:var(--green)">x2.00</b></div>
                    <div class="mul-card"><span>BLUE</span><b id="m-b" style="color:var(--blue)">x2.00</b></div>
                </div>

                <div class="bet-input-container">
                    <svg class="ton-icon"><use href="#ton-logo"></use></svg>
                    <input type="number" id="bet-amt" value="1.00" step="0.1">
                    <button onclick="maxBet()" style="background:none; border:none; color:var(--accent); font-weight:900; font-family:'Outfit'">MAX</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="placeBet('green')" style="flex:1; background:var(--green); border:none; padding:18px; border-radius:15px; font-weight:900; color:#000;">STAKE GREEN</button>
                    <button onclick="placeBet('blue')" style="flex:1; background:var(--blue); border:none; padding:18px; border-radius:15px; font-weight:900; color:#fff;">STAKE BLUE</button>
                </div>

                <div style="margin-top:20px; text-align:left;">
                    <p style="font-size:12px; color:var(--text-m); font-weight:800; margin-bottom:10px;">УЧАСТНИКИ</p>
                    <div id="players-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div id="list-g"></div>
                        <div id="list-b"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-top" class="screen">
            <h2 style="font-family:'Outfit'; text-align:center; margin-bottom:20px;">LEADERBOARD</h2>
            <div id="leaderboard"></div>
        </div>

        <div id="view-profile" class="screen">
            <div class="lvl-box">
                <div class="lvl-header">
                    <span>УРОВЕНЬ 1</span>
                    <span style="color:var(--text-m)">450 / 1000 XP</span>
                </div>
                <div class="lvl-bar"><div class="lvl-fill"></div></div>
            </div>

            <div style="background:var(--card); border:1px solid var(--border); border-radius:24px; padding:20px;">
                <h3 style="font-family:'Outfit'; margin-bottom:15px;">ИНВЕНТАРЬ</h3>
                <div class="inv-grid">
                    <div class="inv-slot">🎁</div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                </div>
            </div>

            <button class="btn-main" onclick="addFunds()" style="background:var(--green); color:#000; margin-top:20px;">ПОПОЛНИТЬ ЧЕРЕЗ TON</button>
            <button class="btn-main" onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid var(--border); color:var(--text-m); font-size:12px;">СБРОСИТЬ ПРОГРЕСС</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('battle', this)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>Битва</span></div>
        <div class="nav-item" onclick="tab('top', this)"><svg viewBox="0 0 24 24"><path d="M7 11h2v10H7zm4-7h2v17h-2zm4 13h2v4h-2z"/></svg><span>Топ</span></div>
        <div class="nav-item" onclick="tab('shop', this)"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2z"/></svg><span>Магазин</span></div>
        <div class="nav-item" onclick="tab('profile', this)"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Профиль</span></div>
    </nav>

<script>
    let state = {
        bal: parseFloat(localStorage.getItem('ton_bal')) || 10.0,
        game: { timer: 15, poolG: 0, poolB: 0, pG: [], pB: [], mySide: null, active: true }
    };

    function updateBal() { 
        document.getElementById('bal-val').innerText = state.bal.toFixed(2);
        localStorage.setItem('ton_bal', state.bal);
    }

    function tab(name, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-'+name).classList.add('active');
        el.classList.add('active');
        if(name === 'top') renderTop();
    }

    // БИТВА
    function startRound() {
        state.game = { timer: 15, poolG: 0, poolB: 0, pG: [], pB: [], mySide: null, active: true };
        document.getElementById('track').classList.remove('spinning');
        updateBattleUI();
        let itv = setInterval(() => {
            state.game.timer--;
            document.getElementById('timer').innerText = state.game.timer;
            if(state.game.timer <= 0) { clearInterval(itv); resolveBattle(); }
        }, 1000);
    }

    function placeBet(side) {
        if(!state.game.active || state.game.mySide) return;
        let amt = parseFloat(document.getElementById('bet-amt').value);
        if(amt > state.bal || amt <= 0) return alert("Недостаточно TON!");
        state.bal -= amt; state.game.mySide = { side, amt };
        addPlayer(side, "Вы", amt);
        updateBal();
    }

    function addPlayer(side, name, amt) {
        if(side === 'green') { state.game.poolG += amt; state.game.pG.unshift({name, amt}); }
        else { state.game.poolB += amt; state.game.pB.unshift({name, amt}); }
        updateBattleUI();
    }

    function updateBattleUI() {
        let total = state.game.poolG + state.game.poolB;
        let pG = total > 0 ? (state.game.poolG / total * 100) : 50;
        let pB = total > 0 ? (state.game.poolB / total * 100) : 50;
        
        document.getElementById('bar-g').style.width = pG + '%';
        document.getElementById('bar-g').innerText = pG.toFixed(0) + '%';
        document.getElementById('bar-b').style.width = pB + '%';
        document.getElementById('bar-b').innerText = pB.toFixed(0) + '%';

        document.getElementById('m-g').innerText = 'x' + (state.game.poolG > 0 ? (total/state.game.poolG).toFixed(2) : '2.00');
        document.getElementById('m-b').innerText = 'x' + (state.game.poolB > 0 ? (total/state.game.poolB).toFixed(2) : '2.00');

        document.getElementById('list-g').innerHTML = state.game.pG.map(p => `<div style="font-size:11px; margin-bottom:5px; color:var(--green)">🟢 ${p.name}: ${p.amt.toFixed(1)}</div>`).join('');
        document.getElementById('list-b').innerHTML = state.game.pB.map(p => `<div style="font-size:11px; margin-bottom:5px; color:var(--blue); text-align:right;">${p.amt.toFixed(1)} :${p.name} 🔵</div>`).join('');
    }

    function resolveBattle() {
        state.game.active = false;
        document.getElementById('track').classList.add('spinning');
        document.getElementById('timer').innerText = "ROLLING...";
        
        setTimeout(() => {
            let total = state.game.poolG + state.game.poolB;
            if(total === 0) { startRound(); return; }
            let winSide = (Math.random()*100 <= (state.game.poolG/total*100)) ? 'green' : 'blue';
            
            document.getElementById('timer').innerText = winSide.toUpperCase() + " WINS!";
            document.getElementById('timer').style.color = winSide === 'green' ? 'var(--green)' : 'var(--blue)';

            if(state.game.mySide && state.game.mySide.side === winSide) {
                let winAmt = state.game.mySide.amt * (total / (winSide === 'green' ? state.game.poolG : state.game.poolB));
                state.bal += winAmt; updateBal();
            }

            setTimeout(() => { document.getElementById('timer').style.color = '#fff'; startRound(); }, 4000);
        }, 2500);
    }

    // ЛИДЕРБОРД
    function renderTop() {
        let container = document.getElementById('leaderboard');
        container.innerHTML = '';
        let mock = [];
        for(let i=1; i<=100; i++) {
            mock.push({ 
                name: i === 1 ? 'Вы (Тест)' : 'Player_' + Math.floor(Math.random()*9999), 
                val: i === 1 ? state.bal : (Math.random()*2500 + 10).toFixed(2) 
            });
        }
        mock.sort((a,b) => b.val - a.val);
        mock.forEach((p, idx) => {
            container.innerHTML += `
                <div class="top-user rank-${idx+1}">
                    <div class="rank-num">${idx+1}</div>
                    <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}" width="100%"></div>
                    <div class="top-name">${p.name}</div>
                    <div class="top-val">${p.val} TON</div>
                </div>
            `;
        });
    }

    // Боты
    setInterval(() => { if(state.game.active && state.game.timer > 3 && Math.random() > 0.7) addPlayer(Math.random() > 0.5 ? 'green' : 'blue', 'User'+Math.floor(Math.random()*99), Math.random()*10+0.5); }, 2000);
    function maxBet() { document.getElementById('bet-amt').value = state.bal.toFixed(2); }
    function closeBonus() { document.getElementById('bonus-modal').style.display = 'none'; state.bal += 0.5; updateBal(); }
    function addFunds() { state.bal += 10; updateBal(); alert("Тестовый депозит +10 TON"); }
    window.onload = () => { updateBal(); startRound(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAHARA LUXURY MONOLITH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           1. CSS ARCHITECTURE: LUXURY DARK (ORANGE & TON ACCENTS)
           ================================================================
        */

        :root {
            --b-100: #000000;
            --b-200: #050505;
            --b-300: #0a0a0a;
            --b-400: #111111;
            --b-500: #1a1a1a;
            --o-100: #ff8c00; /* Главный оранжевый */
            --o-200: #e67e22;
            --o-300: #d35400;
            --o-glow: rgba(255, 140, 0, 0.4);
            --ton-blue: #0088cc; /* Цвет TON */
            --ton-glow: rgba(0, 136, 204, 0.4);
            --t-100: #ffffff;
            --t-200: #a0a0a0;
            --t-300: #555555;
            --success: #00ff88;
            --error: #ff3333;
            --f-main: 'Inter', sans-serif;
            --f-mono: 'JetBrains Mono', monospace;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Системные сбросы */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        body {
            background: var(--b-100);
            color: var(--t-100);
            font-family: var(--f-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 140, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); } }

        /* ================================================================
           2. HEADER
           ================================================================
        */

        .top-container {
            padding: 20px 20px 15px;
            background: linear-gradient(180deg, #050505 0%, #000 100%);
            border-bottom: 1px solid var(--b-500);
            z-index: 100;
        }

        .user-stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px solid var(--o-100);
            background: var(--b-400);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: #fff;
            box-shadow: 0 0 15px var(--o-glow);
        }

        .user-name-tag { font-weight: 800; font-size: 16px; margin-bottom: 2px; text-transform: uppercase; }
        .user-rank-tag { font-size: 10px; color: var(--o-100); font-weight: 900; letter-spacing: 1px; text-transform: uppercase;}

        .balance-widget {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .balance-value { font-family: var(--f-mono); font-size: 22px; font-weight: 900; color: var(--o-100); }
        .balance-currency { font-size: 16px; font-weight: 900; color: var(--ton-blue); text-shadow: 0 0 10px var(--ton-glow); }

        /* ================================================================
           3. VIEWPORT & NAVIGATION
           ================================================================
        */

        .main-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .screen { display: none; animation: fadeIn 0.4s ease forwards; }
        .screen.active { display: block; }

        .nav-footer {
            height: 85px; background: #000;
            border-top: 1px solid var(--b-500);
            display: flex; justify-content: space-around;
            padding: 10px 10px 25px;
            z-index: 1000;
        }

        .nav-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--t-300); gap: 6px;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-btn.active { color: var(--o-100); }
        .nav-btn i { font-size: 22px; font-style: normal; }
        .nav-btn label { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        /* ================================================================
           4. MODULES (ARENA, MINES, SHOP, PROFILE)
           ================================================================
        */

        /* ARENA */
        .arena-master-container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .arena-circle-outer {
            width: 300px; height: 300px; border-radius: 50%;
            border: 1px solid var(--b-500);
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #080808 0%, #000 100%);
        }
        .arena-circle-inner {
            width: 250px; height: 250px; border-radius: 50%;
            border: 4px solid var(--o-100);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 40px var(--o-glow), inset 0 0 20px var(--o-glow);
            animation: pulse-orange 2s infinite; cursor: pointer;
        }
        .arena-status-title { font-size: 38px; font-weight: 900; letter-spacing: -2px; }
        .arena-status-sub { font-size: 11px; font-weight: 800; color: var(--o-100); margin-top: 5px; text-transform: uppercase; }

        /* COMMON UI ELEMENTS */
        .section-header { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 20px; }
        .input-luxury {
            width: 100%; background: var(--b-200); border: 1px solid var(--b-500);
            padding: 18px; border-radius: 14px; color: #fff; font-family: var(--f-mono);
            font-size: 16px; font-weight: 700; margin-top: 10px;
        }
        .btn-luxury {
            width: 100%; background: var(--o-100); color: #000; border: none;
            padding: 18px; border-radius: 14px; font-weight: 900; font-size: 15px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-luxury:active { transform: scale(0.98); }
        .btn-ton { background: var(--ton-blue); color: #fff; box-shadow: 0 5px 15px var(--ton-glow); }
        .btn-success { background: var(--success); color: #000; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2); }

        /* MINES */
        .game-grid-mines {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 8px; max-width: 350px; margin: 20px auto 30px;
        }
        .mine-tile {
            aspect-ratio: 1; background: var(--b-400); border: 1px solid var(--b-500);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.2s; cursor: pointer;
        }
        .mine-tile.revealed { background: var(--o-100); color: #000; border: none; }
        .mine-tile.bomb { background: var(--error); border: none; }

        /* SHOP */
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip {
            background: var(--b-400); border: 1px solid var(--b-500); color: var(--t-200);
            padding: 10px 20px; border-radius: 30px; font-size: 12px; font-weight: 700;
            white-space: nowrap; transition: 0.2s;
        }
        .filter-chip.active { background: #222; border-color: #444; color: #fff; }
        
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .shop-card {
            background: var(--b-400); border: 1px solid var(--b-500);
            border-radius: 20px; padding: 15px; text-align: center;
        }
        .shop-icon-box {
            height: 100px; border-radius: 12px; background: linear-gradient(135deg, #111, #222);
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; border: 1px solid #2a2a2a;
        }
        .shop-item-name { font-weight: 800; font-size: 14px; color: #fff; display: block; margin-bottom: 4px; }
        .shop-item-id { font-size: 10px; color: var(--t-300); font-family: var(--f-mono); display: block; margin-bottom: 15px; }

        /* PROFILE */
        .profile-card { background: var(--b-400); border: 1px solid var(--b-500); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--b-500); }
        .stat-label { color: var(--t-200); font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .stat-val { font-family: var(--f-mono); font-size: 16px; font-weight: 800; color: #fff; }

    </style>
</head>
<body>

    <div class="top-container">
        <div class="user-stats-bar">
            <div class="user-profile-mini">
                <div class="avatar-circle">S</div>
                <div>
                    <div class="user-name-tag">SAHARA_BUBE</div>
                    <div class="user-rank-tag">LEVEL 1 Rookie</div>
                </div>
            </div>
            <div class="balance-widget">
                <span class="balance-value" id="main-bal">4998.60</span>
                <span class="balance-currency">TON</span>
            </div>
        </div>
    </div>

    <main class="main-viewport">
        
        <section id="scr-arena" class="screen active">
            <div class="arena-master-container">
                <div class="arena-circle-outer">
                    <div class="arena-circle-inner" onclick="startSearch()">
                        <span class="arena-status-title">ARENA</span>
                        <span class="arena-status-sub" id="search-label">Ready to fight</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="scr-mines" class="screen">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: var(--o-100); font-family: var(--f-mono); font-weight: 900; letter-spacing: 2px;">SAHARA MINES</h2>
            </div>
            
            <div class="game-grid-mines">
                <script>
                    for(let i=0; i<25; i++) {
                        document.write(`<div class="mine-tile" onclick="revealMine(this)"></div>`);
                    }
                </script>
            </div>

            <div style="background: var(--b-400); padding: 20px; border-radius: 20px; border: 1px solid var(--b-500);">
                <input type="number" id="mine-bet" class="input-luxury" value="1" style="margin-top: 0; margin-bottom: 15px; text-align: center; font-size: 20px;">
                <button class="btn-luxury btn-success">ЗАБРАТЬ: 1.20 TON</button>
            </div>
        </section>

        <section id="scr-shop" class="screen">
            <div class="section-header">Магазин</div>
            
            <div class="filter-scroll">
                <div class="filter-chip active">Гифты</div>
                <div class="filter-chip">Лутпаки</div>
                <div class="filter-chip">Апгрейды</div>
                <div class="filter-chip">Никнеймы</div>
            </div>

            <div class="shop-grid">
                <div class="shop-card">
                    <div class="shop-icon-box">🚀</div>
                    <span class="shop-item-name">Boost Token</span>
                    <span class="shop-item-id">#1187</span>
                    <button class="btn-luxury btn-ton" style="padding: 12px; font-size: 14px;">10.00 TON</button>
                </div>
                <div class="shop-card">
                    <div class="shop-icon-box">💎</div>
                    <span class="shop-item-name">Astral Shard</span>
                    <span class="shop-item-id">#3468</span>
                    <button class="btn-luxury btn-ton" style="padding: 12px; font-size: 14px;">236.60 TON</button>
                </div>
                <div class="shop-card">
                    <div class="shop-icon-box">📈</div>
                    <span class="shop-item-name">Analytics Pack</span>
                    <span class="shop-item-id">#0042</span>
                    <button class="btn-luxury btn-ton" style="padding: 12px; font-size: 14px;">25.00 TON</button>
                </div>
                <div class="shop-card">
                    <div class="shop-icon-box">🎮</div>
                    <span class="shop-item-name">Arena Pass</span>
                    <span class="shop-item-id">#9921</span>
                    <button class="btn-luxury btn-ton" style="padding: 12px; font-size: 14px;">5.00 TON</button>
                </div>
            </div>
        </section>

        <section id="scr-profile" class="screen">
            <div class="profile-card">
                <h2 style="font-size: 24px; margin-bottom: 5px;">SAHARA_BUBE</h2>
                <div class="user-rank-tag" style="font-size: 12px;">ELITE MEMBER</div>
                
                <div class="stat-row" style="margin-top: 25px;">
                    <span class="stat-label">Всего выиграно:</span>
                    <span class="stat-val">4.80 <span style="color: var(--ton-blue);">TON</span></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Сделано ставок:</span>
                    <span class="stat-val">1</span>
                </div>
            </div>
            
            <div class="profile-card">
                <div class="stat-label" style="margin-bottom: 10px;">Финансы</div>
                <button class="btn-luxury" style="background: #222; color: #fff;">ПОПОЛНИТЬ TON</button>
            </div>
        </section>

    </main>

    <nav class="nav-footer">
        <div class="nav-btn active" onclick="navigate('arena', this)"><i>⚔️</i><label>Arena</label></div>
        <div class="nav-btn" onclick="navigate('mines', this)"><i>💣</i><label>Mines</label></div>
        <div class="nav-btn" onclick="navigate('shop', this)"><i>🛒</i><label>Shop</label></div>
        <div class="nav-btn" onclick="navigate('profile', this)"><i>👤</i><label>Profile</label></div>
    </nav>

    <script>
        /* ================================================================
           CORE LOGIC ENGINE
           ================================================================
        */

        const STATE = {
            bal: 4998.60,
            isSearching: false
        };

        // UI Update
        function updateBal() {
            document.getElementById('main-bal').innerText = STATE.bal.toFixed(2);
        }

        // Navigation
        function navigate(screenId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('scr-' + screenId).classList.add('active');
            btn.classList.add('active');
        }

        // Arena Logic
        function startSearch() {
            if(STATE.isSearching) return;
            
            STATE.isSearching = true;
            const label = document.getElementById('search-label');
            const inner = document.querySelector('.arena-circle-inner');
            
            label.innerText = "Searching Opponent...";
            inner.style.borderColor = "#fff";
            inner.style.boxShadow = "0 0 60px rgba(255,255,255,0.2)";

            setTimeout(() => {
                label.innerText = "MATCH FOUND!";
                inner.style.borderColor = "var(--success)";
                setTimeout(() => {
                    STATE.isSearching = false;
                    label.innerText = "Ready to fight";
                    inner.style.borderColor = "var(--o-100)";
                    inner.style.boxShadow = "0 0 40px var(--o-glow)";
                }, 2000);
            }, 3000);
        }

        // Fake Mines Logic for visual feedback
        function revealMine(el) {
            if(el.classList.contains('revealed') || el.classList.contains('bomb')) return;
            
            // 20% шанс попасть на бомбу для демо
            if(Math.random() < 0.2) {
                el.classList.add('bomb');
                el.innerText = "💥";
            } else {
                el.classList.add('revealed');
                // Вместо алмаза ставим просто отметку или лого монетки
                el.innerHTML = "<span style='color: #000; font-weight: 900;'>✓</span>";
            }
        }

        window.onload = updateBal;
    </script>
</body>
</html>

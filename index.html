<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON BATTLE PRESTIGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0f;
            --accent: #0088cc;
            --text: #ffffff;
            --text-m: #707075;
            --border: #1f1f22;
            --green: #2ecb71;
            --blue: #0088cc;
            --gold: #f7a809;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header {
            height: 65px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo { font-family: 'Outfit'; font-weight: 900; font-size: 20px; color: #fff; }
        .balance-pill { background: #121214; padding: 6px 12px; border-radius: 100px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; font-family: 'Outfit'; }
        .ton-icon { width: 16px; height: 16px; background: #0088cc; border-radius: 50%; display: inline-block; vertical-align: middle; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #080808; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding-bottom: 15px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-m); font-size: 10px; font-weight: 700; text-transform: uppercase; width: 20%; cursor: pointer;}
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

        /* SCREENS */
        .content { padding-top: 65px; padding-bottom: 80px; height: 100vh; overflow-y: auto; }
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BATTLE UI */
        .battle-timer-wrap { width: 180px; height: 180px; border: 4px solid var(--border); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; position: relative; }
        .timer-val { font-size: 40px; font-family: 'Outfit'; font-weight: 900; }
        .spinner-arc { position: absolute; inset: -4px; border: 4px solid transparent; border-top-color: var(--accent); border-radius: 50%; display: none; animation: spin 0.6s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .muls-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Outfit'; font-weight: 900; font-size: 18px; }
        .chance-bar { height: 35px; background: #1a1a1e; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 20px; border: 1px solid var(--border); }
        .bar-segment { display: flex; align-items: center; justify-content: center; font-weight: 900; transition: width 0.4s ease; font-size: 14px; }

        .bet-input-box { background: #121214; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .bet-input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 18px; font-weight: 800; outline: none; }
        
        .bet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-side { padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-family: 'Outfit'; cursor: pointer; }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }

        /* LEADERBOARD (REALISTIC) */
        .top-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .top-rank { width: 24px; font-weight: 900; color: var(--text-m); font-size: 14px; }
        .top-ava { width: 36px; height: 36px; border-radius: 10px; background: #222; }
        .top-info { flex: 1; }
        .top-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .top-bal { color: var(--accent); font-weight: 800; font-family: 'Outfit'; font-size: 13px; }

        /* PROFILE (RETRO STYLE) */
        .prof-header { background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); padding: 30px 15px; text-align: center; }
        .prof-bal-main { font-size: 48px; font-weight: 900; font-family: 'Outfit'; margin: 10px 0; }
        .prof-grid-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .p-btn { background: #121214; border: 1px solid var(--border); padding: 15px 5px; border-radius: 16px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-m); }
        .p-btn-icon { font-size: 20px; display: block; margin-bottom: 5px; color: #fff; }

        .inventory-section { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); }
        .inv-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; font-size: 14px; }
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inv-slot { aspect-ratio: 1; background: #121214; border-radius: 16px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BATTLE ROLLS</div>
        <div class="balance-pill">
            <span id="bal-val">10.00</span>
            <span class="ton-icon"></span>
        </div>
    </div>

    <div class="content">
        <div id="view-battle" class="screen active">
            <div class="battle-timer-wrap">
                <div id="spinner" class="spinner-arc"></div>
                <div class="timer-val" id="timer">15</div>
            </div>

            <div class="muls-row">
                <div style="color:var(--green)">x<span id="m-g">2.00</span></div>
                <div style="color:var(--blue)">x<span id="m-b">2.00</span></div>
            </div>

            <div class="chance-bar">
                <div id="bar-g" class="bar-segment" style="width:50%; background:var(--green); color:#000;">50%</div>
                <div id="bar-b" class="bar-segment" style="width:50%; background:var(--blue); color:#fff;">50%</div>
            </div>

            <div class="bet-input-box">
                <input type="number" id="bet-amt" value="1.00" step="0.1">
                <button onclick="quick(2)" style="background:none; border:none; color:var(--accent); font-weight:900;">X2</button>
            </div>

            <div class="bet-btns">
                <button class="btn-side btn-green" onclick="bet('green')">ЗЕЛЕНЫЕ</button>
                <button class="btn-side btn-blue" onclick="bet('blue')">СИНИЕ</button>
            </div>

            <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;" id="players-lists">
                <div id="list-g"></div>
                <div id="list-b"></div>
            </div>
        </div>

        <div id="view-top" class="screen">
            <h2 style="text-align:center; margin-bottom:20px; font-family:'Outfit'">LEADERBOARD</h2>
            <div id="top-list"></div>
        </div>

        <div id="view-profile" class="screen">
            <div class="prof-header">
                <p style="color:var(--text-m); font-weight:800;">Игровой баланс</p>
                <div class="prof-bal-main"><span id="p-bal">10.00</span> <small style="font-size:16px">TON</small></div>
                
                <div class="prof-grid-btns">
                    <div class="p-btn"><span class="p-btn-icon">⭐</span>Пополнить Stars</div>
                    <div class="p-btn" onclick="addMoney()"><span class="p-btn-icon">💎</span>Пополнить TON</div>
                    <div class="p-btn"><span class="p-btn-icon">🎁</span>Отправить гифты</div>
                </div>

                <div class="inventory-section">
                    <div class="inv-header">
                        <span>Мой Инвентарь</span>
                        <span style="color:var(--text-m)">0 Айтемов</span>
                    </div>
                    <div class="inv-grid">
                        <div class="inv-slot">📦</div>
                        <div class="inv-slot">📦</div>
                        <div class="inv-slot" style="border:none; background:#1a1a1e; font-size:10px; flex-direction:column;">
                            <span>● ● ●</span>
                            <span>Все Айтемы</span>
                        </div>
                    </div>
                    <p style="margin-top:15px; font-size:12px; color:var(--text-m)">У тебя пока нет айтемов.</p>
                </div>
                
                <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:none; border:none; color:var(--text-m); font-size:12px; text-decoration:underline;">СБРОСИТЬ ДАННЫЕ</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('battle', this)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>Битва</span></div>
        <div class="nav-item" onclick="tab('top', this)"><svg viewBox="0 0 24 24"><path d="M7 11h2v10H7zm4-7h2v17h-2zm4 13h2v4h-2z"/></svg><span>Топ</span></div>
        <div class="nav-item" onclick="tab('shop', this)"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2z"/></svg><span>Магазин</span></div>
        <div class="nav-item" onclick="tab('profile', this)"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Профиль</span></div>
    </nav>

<script>
    let bal = parseFloat(localStorage.getItem('tb_bal')) || 25.0;
    let game = { timer: 15, poolG: 0, poolB: 0, playersG: [], playersB: [], mySide: null, active: true };

    function save() { 
        localStorage.setItem('tb_bal', bal.toFixed(2)); 
        document.getElementById('bal-val').innerText = bal.toFixed(2);
        document.getElementById('p-bal').innerText = bal.toFixed(2);
    }

    function tab(name, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + name).classList.add('active');
        el.classList.add('active');
        if(name === 'top') renderTop();
    }

    function startRound() {
        game = { timer: 15, poolG: 0, poolB: 0, playersG: [], playersB: [], mySide: null, active: true };
        document.getElementById('spinner').style.display = 'none';
        updateUI();
        let itv = setInterval(() => {
            game.timer--;
            document.getElementById('timer').innerText = game.timer;
            if(game.timer <= 0) { clearInterval(itv); resolve(); }
        }, 1000);
    }

    function bet(side) {
        if(!game.active || game.mySide) return;
        let amt = parseFloat(document.getElementById('bet-amt').value);
        if(amt > bal || amt <= 0) return alert("Мало TON!");
        bal -= amt; game.mySide = { side, amt };
        addPlayer(side, "Вы", amt);
        save();
    }

    function addPlayer(side, name, amt) {
        if(side === 'green') { game.poolG += amt; game.playersG.unshift({name, amt}); }
        else { game.poolB += amt; game.playersB.unshift({name, amt}); }
        updateUI();
    }

    function updateUI() {
        let total = game.poolG + game.poolB;
        let pG = total > 0 ? (game.poolG / total * 100) : 50;
        let pB = total > 0 ? (game.poolB / total * 100) : 50;
        document.getElementById('bar-g').style.width = pG + '%';
        document.getElementById('bar-g').innerText = pG.toFixed(0) + '%';
        document.getElementById('bar-b').style.width = pB + '%';
        document.getElementById('bar-b').innerText = pB.toFixed(0) + '%';
        
        document.getElementById('m-g').innerText = game.poolG > 0 ? (total/game.poolG).toFixed(2) : '2.00';
        document.getElementById('m-b').innerText = game.poolB > 0 ? (total/game.poolB).toFixed(2) : '2.00';

        document.getElementById('list-g').innerHTML = game.playersG.map(p => `<div style="font-size:11px; margin-bottom:4px; opacity:0.8;">🟢 ${p.name}: ${p.amt.toFixed(1)}</div>`).join('');
        document.getElementById('list-b').innerHTML = game.playersB.map(p => `<div style="font-size:11px; margin-bottom:4px; opacity:0.8; text-align:right;">${p.amt.toFixed(1)} :${p.name} 🔵</div>`).join('');
    }

    function resolve() {
        game.active = false;
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('timer').innerText = '...';
        setTimeout(() => {
            let total = game.poolG + game.poolB;
            if(total === 0) { startRound(); return; }
            let winSide = (Math.random() * 100 <= (game.poolG / total * 100)) ? 'green' : 'blue';
            document.getElementById('timer').innerText = winSide === 'green' ? 'ЗЕЛЕНЫЕ' : 'СИНИЕ';
            document.getElementById('timer').style.color = winSide === 'green' ? 'var(--green)' : 'var(--blue)';
            
            if(game.mySide && game.mySide.side === winSide) {
                let winAmt = game.mySide.amt * (total / (winSide === 'green' ? game.poolG : game.poolB));
                bal += winAmt; save();
            }
            setTimeout(() => { document.getElementById('timer').style.color = '#fff'; startRound(); }, 3000);
        }, 2000);
    }

    function renderTop() {
        const list = document.getElementById('top-list');
        list.innerHTML = '';
        let mock = [];
        for(let i=1; i<=100; i++) {
            mock.push({ 
                name: i === 1 ? 'Вы (Тест)' : 'User_' + Math.floor(Math.random()*9000 + 1000), 
                val: i === 1 ? bal : (Math.random()*1000 + 5).toFixed(2) 
            });
        }
        mock.sort((a,b) => b.val - a.val);
        mock.forEach((u, idx) => {
            list.innerHTML += `
                <div class="top-card">
                    <div class="top-rank">${idx+1}</div>
                    <div class="top-ava"></div>
                    <div class="top-info">
                        <div class="top-name">${u.name}</div>
                        <div class="top-bal">${u.val} TON</div>
                    </div>
                </div>
            `;
        });
    }

    // Боты
    setInterval(() => { if(game.active && Math.random() > 0.6) addPlayer(Math.random() > 0.5 ? 'green' : 'blue', "Bot_"+Math.floor(Math.random()*99), Math.random()*5+0.5); }, 1500);
    function quick(m) { document.getElementById('bet-amt').value = (document.getElementById('bet-amt').value * m).toFixed(2); }
    function addMoney() { bal += 10.0; save(); }
    window.onload = () => { save(); startRound(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON BATTLE ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0f;
            --accent: #0088cc;
            --text: #ffffff;
            --text-m: #707075;
            --border: #1f1f22;
            --green: #2ecb71;
            --blue: #0088cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header {
            height: 65px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo { font-family: 'Outfit'; font-weight: 900; font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .balance-pill { background: #121214; padding: 6px 12px; border-radius: 100px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; font-family: 'Outfit'; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #080808; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding-bottom: 15px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-m); font-size: 10px; font-weight: 700; text-transform: uppercase; width: 25%; cursor: pointer;}
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        /* CONTENT */
        .content { padding-top: 65px; padding-bottom: 80px; height: 100vh; overflow-y: auto; }
        .screen { display: none; padding: 15px; animation: slideUp 0.3s ease; }
        .screen.active { display: block; }

        /* BATTLE CORE */
        .battle-circle-wrap { position: relative; width: 220px; height: 220px; margin: 20px auto; border-radius: 50%; border: 4px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden;}
        .battle-circle-spin { position: absolute; inset: 0; border-radius: 50%; border: 8px solid transparent; border-top-color: var(--accent); transition: transform 0.5s linear; display: none; }
        .battle-timer { font-size: 48px; font-weight: 900; font-family: 'Outfit'; z-index: 10; }
        
        .chance-container { display: flex; height: 35px; border-radius: 12px; overflow: hidden; margin: 15px 0; background: #1a1a1e; }
        .chance-g { background: var(--green); color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; transition: width 0.4s; }
        .chance-b { background: var(--blue); color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; transition: width 0.4s; }

        .muls { display: flex; justify-content: space-between; font-weight: 800; font-family: 'Outfit'; margin-bottom: 10px; }
        .muls .g { color: var(--green); }
        .muls .b { color: var(--blue); }

        .bet-input-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .bet-input-container input { flex: 1; background: #121214; border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 12px; font-size: 18px; font-weight: 800; outline: none; text-align: center; }
        .quick-btn { background: #1a1a1e; border: 1px solid var(--border); color: #fff; padding: 0 12px; border-radius: 10px; font-weight: 800; }

        .bet-btns { display: flex; gap: 10px; }
        .btn-g, .btn-b { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 900; font-family: 'Outfit'; text-transform: uppercase; cursor: pointer; }
        .btn-g { background: var(--green); color: #000; }
        .btn-b { background: var(--blue); color: #fff; }

        .player-lists { display: flex; gap: 10px; margin-top: 20px; }
        .p-list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .p-item { background: #121214; padding: 8px 10px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; border-left: 3px solid transparent; }
        .p-item.g { border-color: var(--green); }
        .p-item.b { border-color: var(--blue); }

        /* LEADERBOARD */
        .lead-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #121214; border-radius: 12px; margin-bottom: 8px; }
        .lead-rank { width: 30px; font-weight: 900; font-family: 'Outfit'; color: var(--text-m); }
        .lead-name { flex: 1; font-weight: 700; }
        .lead-bal { font-weight: 800; color: var(--accent); font-family: 'Outfit'; }

        @keyframes spinning { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-spinning { display: block !important; animation: spinning 0.5s infinite linear; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BATTLE <span>ROLLS</span></div>
        <div class="balance-pill"><span id="bal-val">0.00</span> 💎</div>
    </div>

    <div class="content">
        <div id="view-battle" class="screen active">
            <div class="battle-circle-wrap">
                <div id="spinner" class="battle-circle-spin"></div>
                <div class="battle-timer" id="timer">15</div>
            </div>

            <div class="muls">
                <div class="g">x<span id="mul-g">2.00</span></div>
                <div class="b">x<span id="mul-b">2.00</span></div>
            </div>

            <div class="chance-container">
                <div id="bar-g" class="chance-g" style="width: 50%;">50%</div>
                <div id="bar-b" class="chance-b" style="width: 50%;">50%</div>
            </div>

            <div class="bet-input-container">
                <input type="number" id="bet-amt" value="1.00">
                <button class="quick-btn" onclick="quick(0.5)">1/2</button>
                <button class="quick-btn" onclick="quick(2)">X2</button>
                <button class="quick-btn" onclick="setMax()">MAX</button>
            </div>

            <div class="bet-btns">
                <button class="btn-g" onclick="placeBet('green')">ЗЕЛЕНЫЕ</button>
                <button class="btn-b" onclick="placeBet('blue')">СИНИЕ</button>
            </div>

            <div class="player-lists">
                <div class="p-list" id="list-g"></div>
                <div class="p-list" id="list-b"></div>
            </div>
        </div>

        <div id="view-top" class="screen">
            <h2 style="text-align:center; margin-bottom:15px; font-family:'Outfit'">TOP 100 PLAYERS</h2>
            <div id="leaderboard-container"></div>
        </div>

        <div id="view-shop" class="screen">
            <h2 style="text-align:center; margin-top:50px; color:var(--text-m)">MARKET COMING SOON</h2>
        </div>

        <div id="view-profile" class="screen">
            <div style="text-align:center; padding:20px;">
                <div style="width:80px; height:80px; background:var(--accent); border-radius:20px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:900;">P</div>
                <h3>@Player_TON</h3>
                <button onclick="addMoney()" style="margin-top:20px; width:100%; padding:15px; border-radius:12px; background:var(--green); border:none; font-weight:900;">+100 TEST COINS</button>
                <button onclick="localStorage.clear(); location.reload();" style="margin-top:10px; width:100%; padding:12px; border-radius:12px; background:transparent; border:1px solid var(--border); color:var(--text-m); font-weight:700;">RESET DATA</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('battle', this)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>Битва</span></div>
        <div class="nav-item" onclick="tab('top', this)"><svg viewBox="0 0 24 24"><path d="M7 11h2v10H7zm4-7h2v17h-2zm4 13h2v4h-2z"/></svg><span>Топ</span></div>
        <div class="nav-item" onclick="tab('shop', this)"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span>Магазин</span></div>
        <div class="nav-item" onclick="tab('profile', this)"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Профиль</span></div>
    </nav>

<script>
    let bal = parseFloat(localStorage.getItem('b_bal')) || 50.0;
    let game = { timer: 15, poolG: 0, poolB: 0, betsG: [], betsB: [], myBet: null, active: true };
    const names = ['loser228', 'whale_ton', 'yculu', 'snoop', 'dex_pro', 'king77', 'lucky_man', 'bot_1', 'ton_shill'];

    function save() { localStorage.setItem('b_bal', bal.toFixed(2)); document.getElementById('bal-val').innerText = bal.toFixed(2); }
    function tab(name, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-'+name).classList.add('active');
        el.classList.add('active');
        if(name === 'top') renderTop();
    }

    // ЛОГИКА БИТВЫ
    function startRound() {
        game = { timer: 15, poolG: 0, poolB: 0, betsG: [], betsB: [], myBet: null, active: true };
        document.getElementById('spinner').classList.remove('is-spinning');
        updateUI();
        let itv = setInterval(() => {
            game.timer--;
            document.getElementById('timer').innerText = game.timer;
            if(game.timer <= 0) { clearInterval(itv); resolve(); }
        }, 1000);
    }

    function placeBet(side) {
        if(!game.active || game.myBet) return;
        let amt = parseFloat(document.getElementById('bet-amt').value);
        if(amt > bal || amt <= 0) return alert("Недостаточно денег!");
        bal -= amt; game.myBet = { side, amt };
        addBet(side, 'Вы', amt);
        save();
    }

    function addBet(side, name, amt) {
        if(side === 'green') { game.poolG += amt; game.betsG.unshift({name, amt}); }
        else { game.poolB += amt; game.betsB.unshift({name, amt}); }
        updateUI();
    }

    function updateUI() {
        let total = game.poolG + game.poolB;
        let pG = total > 0 ? (game.poolG / total * 100) : 50;
        let pB = total > 0 ? (game.poolB / total * 100) : 50;
        
        document.getElementById('bar-g').style.width = pG + '%';
        document.getElementById('bar-g').innerText = pG.toFixed(0) + '%';
        document.getElementById('bar-b').style.width = pB + '%';
        document.getElementById('bar-b').innerText = pB.toFixed(0) + '%';
        
        document.getElementById('mul-g').innerText = game.poolG > 0 ? (total/game.poolG).toFixed(2) : '2.00';
        document.getElementById('mul-b').innerText = game.poolB > 0 ? (total/game.poolB).toFixed(2) : '2.00';

        document.getElementById('list-g').innerHTML = game.betsG.map(b => `<div class="p-item g"><span>${b.name}</span><span>${b.amt.toFixed(1)}</span></div>`).join('');
        document.getElementById('list-b').innerHTML = game.betsB.map(b => `<div class="p-item b"><span>${b.name}</span><span>${b.amt.toFixed(1)}</span></div>`).join('');
    }

    function resolve() {
        game.active = false;
        document.getElementById('spinner').classList.add('is-spinning');
        document.getElementById('timer').innerText = '...';

        setTimeout(() => {
            let total = game.poolG + game.poolB;
            if(total === 0) { startRound(); return; }
            
            let winSide = (Math.random() * 100 <= (game.poolG / total * 100)) ? 'green' : 'blue';
            document.getElementById('spinner').classList.remove('is-spinning');
            document.getElementById('timer').innerText = winSide === 'green' ? 'ЗЕЛЕНЫЕ' : 'СИНИЕ';
            document.getElementById('timer').style.color = winSide === 'green' ? 'var(--green)' : 'var(--blue)';

            if(game.myBet && game.myBet.side === winSide) {
                let winAmt = game.myBet.amt * (total / (winSide === 'green' ? game.poolG : game.poolB));
                bal += winAmt;
                save();
            }

            setTimeout(() => {
                document.getElementById('timer').style.color = '#fff';
                startRound();
            }, 3000);
        }, 2000);
    }

    // ТАБЛИЦА ЛИДЕРОВ (100 ИГРОКОВ)
    function renderTop() {
        let container = document.getElementById('leaderboard-container');
        container.innerHTML = '';
        let mockData = [];
        for(let i=1; i<=100; i++) {
            mockData.push({
                name: i === 1 ? 'Вы (Тест)' : 'User_' + Math.floor(Math.random()*9999),
                bal: i === 1 ? bal : (Math.random() * 5000 + 10).toFixed(2)
            });
        }
        mockData.sort((a,b) => b.bal - a.bal);
        mockData.forEach((p, idx) => {
            container.innerHTML += `
                <div class="lead-item">
                    <div class="lead-rank">${idx+1}</div>
                    <div class="lead-name">${p.name}</div>
                    <div class="lead-bal">${p.bal} 💎</div>
                </div>
            `;
        });
    }

    // Боты для массовки
    setInterval(() => {
        if(game.active && game.timer > 2 && Math.random() > 0.5) {
            addBet(Math.random() > 0.5 ? 'green' : 'blue', names[Math.floor(Math.random()*names.length)], Math.random()*15 + 1);
        }
    }, 1200);

    function quick(m) { let i = document.getElementById('bet-amt'); i.value = (parseFloat(i.value)*m).toFixed(2); }
    function setMax() { document.getElementById('bet-amt').value = bal.toFixed(2); }
    function addMoney() { bal += 100; save(); }

    window.onload = () => { save(); startRound(); };
</script>
</body>
</html>
